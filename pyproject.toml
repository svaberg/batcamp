[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "batcamp"
version = "0.1.0"
description = "Octree reconstruction and interpolation utilities"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [
  { name = "Dag Evensberget" },
]
keywords = ["octree", "interpolation", "amr", "batsrus", "simulation"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering",
]
dependencies = [
  "batread",
  "numpy",
  "numba",
]

[project.urls]
Homepage = "https://github.com/svaberg/batcamp"
Repository = "https://github.com/svaberg/batcamp"
Issues = "https://github.com/svaberg/batcamp/issues"

[project.optional-dependencies]
tests = [
  "pytest",
  "pooch",
  "nbclient",
  "nbformat",
  "ipykernel",
  "matplotlib",
  "scipy",
]
examples = [
  "scipy",
  "matplotlib",
  "pooch",
  "jupyter",
  "nbconvert",
  "ipykernel",
]

[tool.setuptools.packages.find]
include = ["batcamp*"]

[tool.setuptools]
license-files = ["LICENSE"]

[tool.pytest.ini_options]
addopts = "-m 'not slow'"
pythonpath = ["tests"]
markers = [
  "slow: expensive tests excluded from the default unit-test run",
  "design_lockin: implementation-locking tests",
  "pooch: tests that fetch sample files via pooch/network (opt-in with --run-pooch)",
]
