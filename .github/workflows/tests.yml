name: ci

on:
  pull_request:
  push:

env:
  XDG_CACHE_HOME: ${{ github.workspace }}/.cache

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run flake8
        shell: bash -l {0}
        run: flake8 batcamp tests examples --count --statistics

  default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore pooch cache
        uses: actions/cache@v4
        with:
          path: ${{ env.XDG_CACHE_HOME }}/pooch
          key: pooch-${{ runner.os }}-${{ hashFiles('examples/benchmark_helpers.py', 'tests/sample_data_helper.py') }}
          restore-keys: |
            pooch-${{ runner.os }}-

      - name: Restore benchmark grid cache
        uses: actions/cache@v4
        with:
          path: artifacts/test_example_imports/benchmark_grid_vs_ray_*_grid_cache_*.npz
          key: grid-vs-ray-npz-${{ runner.os }}-${{ hashFiles('examples/benchmark_grid_vs_ray.py', 'examples/benchmark_helpers.py', 'tests/test_example_imports.py') }}

      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run default test suite with coverage
        shell: bash -l {0}
        run: pytest -q -m "not pooch and not perf" --cov=. --cov-report=xml:pytest-cobertura.xml

      - name: Upload grid-vs-ray benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-grid-vs-ray-artifacts
          path: |
            artifacts/test_example_imports/benchmark_grid_vs_ray.log
            artifacts/test_example_imports/benchmark_grid_vs_ray_example_trilinear_*.png
            artifacts/test_example_imports/benchmark_grid_vs_ray_example_trilinear_*.md
            artifacts/test_example_imports/benchmark_grid_vs_ray_example_trilinear_*.csv
          if-no-files-found: warn

      - name: Upload xy-plane benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-xy-plane-artifacts
          path: |
            artifacts/test_example_imports/benchmark_xy_plane.log
            artifacts/test_example_imports/benchmark_xy_plane_example_*.png
            artifacts/test_example_imports/benchmark_xy_plane_example_*.md
          if-no-files-found: warn

      - name: Upload random-points benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-random-points-artifacts
          path: |
            artifacts/test_example_imports/benchmark_random_points.log
            artifacts/test_example_imports/benchmark_random_points_example_*.png
            artifacts/test_example_imports/benchmark_random_points_example_*.md
          if-no-files-found: warn

      - name: Upload star-movie benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-star-movie-artifacts
          path: |
            artifacts/test_example_imports/benchmark_star_movie.log
            artifacts/test_example_imports/benchmark_star_movie_*.mp4
            artifacts/test_example_imports/benchmark_star_movie_*_timing_report.md
            artifacts/test_example_imports/benchmark_star_movie_*_frame_times.csv
            artifacts/test_example_imports/benchmark_star_movie_*_frames/frame_*.png
          if-no-files-found: warn

      - name: Codacy Coverage Reporter
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: pytest-cobertura.xml

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Build distributions
        shell: bash -l {0}
        run: python -m build

      - name: Check built distributions
        shell: bash -l {0}
        run: python -m twine check dist/*

  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore pooch cache
        uses: actions/cache@v4
        with:
          path: ${{ env.XDG_CACHE_HOME }}/pooch
          key: pooch-${{ runner.os }}-${{ hashFiles('examples/benchmark_helpers.py', 'tests/sample_data_helper.py') }}
          restore-keys: |
            pooch-${{ runner.os }}-

      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run perf tests
        shell: bash -l {0}
        run: pytest -q -m perf -o addopts=''

  pooch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore pooch cache
        uses: actions/cache@v4
        with:
          path: ${{ env.XDG_CACHE_HOME }}/pooch
          key: pooch-${{ runner.os }}-${{ hashFiles('examples/benchmark_helpers.py', 'tests/sample_data_helper.py') }}
          restore-keys: |
            pooch-${{ runner.os }}-

      - uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run pooch integration tests
        shell: bash -l {0}
        run: pytest -m pooch -o addopts='' -vv -s
