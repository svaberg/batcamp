name: ci

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run useful flake8 checks
        shell: bash -l {0}
        run: flake8 batcamp tests examples --count --select=E9,F63,F7,F82 --show-source --statistics

  default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run default test suite with coverage
        shell: bash -l {0}
        run: pytest -q --cov=batcamp --cov-report=xml:pytest-cobertura.xml

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Build distributions
        shell: bash -l {0}
        run: python -m build

      - name: Check built distributions
        shell: bash -l {0}
        run: python -m twine check dist/*

  slow:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run slow tests
        shell: bash -l {0}
        run: pytest -q -m slow -o addopts=''

  pooch:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run pooch integration tests
        shell: bash -l {0}
        run: pytest -q -m pooch -o addopts=''
