name: ci

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run flake8
        shell: bash -l {0}
        run: flake8 batcamp tests examples --count --statistics

  default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run default test suite with coverage
        shell: bash -l {0}
        run: pytest -q --cov=batcamp --cov-report=xml:pytest-cobertura.xml

      - name: Codacy Coverage Reporter
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: pytest-cobertura.xml

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Build distributions
        shell: bash -l {0}
        run: python -m build

      - name: Check built distributions
        shell: bash -l {0}
        run: python -m twine check dist/*

  perf:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run perf tests
        shell: bash -l {0}
        run: pytest -q -m perf --run-perf -o addopts=''

  pooch:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          cache-environment: true
          cache-downloads: true
          init-shell: bash

      - name: Install batcamp with test dependencies
        shell: bash -l {0}
        run: pip install -e '.[tests]'

      - name: Run pooch integration tests
        shell: bash -l {0}
        run: pytest -q -m pooch --run-pooch -o addopts=''
